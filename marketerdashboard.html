<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Marketer Dashboard</title>

<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100">

<div class="flex min-h-screen">

<!-- Sidebar -->
<aside class="w-72 bg-green-900 text-white p-6">

<h1 class="text-3xl font-extrabold mb-8">REPORTTRACK</h1>

<nav class="space-y-4 font-semibold">

<a href="marketer-dashboard.html" class="block hover:bg-green-700 p-2 rounded">Dashboard</a>
<a href="create-report.html" class="block hover:bg-green-700 p-2 rounded">Create Report</a>
<a href="reports.html" class="block hover:bg-green-700 p-2 rounded">My Reports</a>
<a href="profile.html" class="block hover:bg-green-700 p-2 rounded">Profile</a>

<button onclick="logoutUser()" class="w-full text-left bg-red-600 hover:bg-red-700 p-2 rounded mt-6">
Logout
</button>

</nav>

</aside>

<!-- Main -->
<main class="flex-1 p-8">

<h2 class="text-4xl font-extrabold mb-6">Marketer Dashboard</h2>

<!-- Cards -->
<div class="grid grid-cols-1 md:grid-cols-3 gap-6">

<div class="bg-white p-6 rounded-xl shadow">
<h3 class="font-bold">My Reports</h3>
<p class="text-3xl font-extrabold text-blue-600">0</p>
</div>

<div class="bg-white p-6 rounded-xl shadow">
<h3 class="font-bold">Pending</h3>
<p class="text-3xl font-extrabold text-yellow-500">0</p>
</div>

<div class="bg-white p-6 rounded-xl shadow">
<h3 class="font-bold">Approved</h3>
<p class="text-3xl font-extrabold text-green-600">0</p>
</div>

</div>

<!-- Search -->
<div class="mt-10 bg-white p-6 rounded-xl shadow">

<input type="text" placeholder="Search Reports..."
class="w-full border p-3 rounded-lg">

</div>

</main>

</div>

<script type="module" src="js/dashboard.js"></script>
<script type="module" src="js/auth.js"></script>

</body>
</html>
