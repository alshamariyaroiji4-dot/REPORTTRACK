<!DOCTYPE html>
<html>
<head>
  <title>Register</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 flex justify-center items-center h-screen">

<div class="bg-white p-8 rounded-xl shadow w-96">

<h1 class="text-2xl font-bold mb-5">Marketer Register</h1>

<input id="name" placeholder="Name" class="w-full border p-3 mb-3">
<input id="email" type="email" placeholder="Email" class="w-full border p-3 mb-3">
<input id="password" type="password" placeholder="Password" class="w-full border p-3 mb-3">

<button onclick="register()" class="bg-green-600 text-white w-full p-3 rounded">
Register
</button>

</div>

<script type="module" src="script.js"></script>
</body>
</html>
