<!DOCTYPE html>
<html>
<head>
  <title>ReportTrack Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 flex justify-center items-center h-screen">

<div class="bg-white p-8 rounded-xl shadow w-96">

<h1 class="text-2xl font-bold mb-5 text-center">ReportTrack Login</h1>

<select id="role" class="w-full border p-3 mb-3">
  <option value="admin">Admin</option>
  <option value="marketer">Marketer</option>
</select>

<input id="email" type="email" placeholder="Email" class="w-full border p-3 mb-3">
<input id="password" type="password" placeholder="Password" class="w-full border p-3 mb-3">

<button onclick="login()" class="bg-blue-600 text-white w-full p-3 rounded">
Login
</button>

<p class="mt-3 text-center">
<a href="register.html" class="text-blue-500">Marketer Register</a>
</p>

</div>

<script type="module" src="script.js"></script>
</body>
</html>
