<!DOCTYPE html>
<html>
<head>
<script src="https://cdn.tailwindcss.com"></script>
<title>Register</title>
</head>

<body class="bg-gray-100">

<div class="max-w-md mx-auto mt-20 bg-white p-8 rounded-xl shadow">

<h2 class="text-2xl font-bold mb-5">
Marketer Registration
</h2>

<input
id="name"
placeholder="Name"
class="w-full border p-3 mb-3 rounded">

<input
id="email"
type="email"
placeholder="Email"
class="w-full border p-3 mb-3 rounded">

<input
id="password"
type="password"
placeholder="Password"
class="w-full border p-3 mb-3 rounded">

<button
onclick="registerMarketer()"
class="w-full bg-green-600 text-white p-3 rounded">

Register

</button>

</div>

<script type="module" src="script.js"></script>

</body>
</html>
