<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Create Report - REPORTTRACK</title>

<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100">

<div class="flex min-h-screen">

<!-- Sidebar -->
<aside class="w-72 bg-blue-900 text-white p-6">

<h1 class="text-3xl font-extrabold mb-8">REPORTTRACK</h1>

<a href="admin-dashboard.html" class="block mb-3 font-semibold">Dashboard</a>
<a href="reports.html" class="block mb-3 font-semibold">Reports</a>
<a href="profile.html" class="block mb-3 font-semibold">Profile</a>

<button onclick="logoutUser()" class="mt-6 bg-red-600 p-2 w-full rounded font-bold">
Logout
</button>

</aside>

<!-- Main -->
<main class="flex-1 p-10">

<h2 class="text-4xl font-extrabold mb-6">Create Report</h2>

<div class="bg-white p-6 rounded-xl shadow max-w-xl">

<input id="title"
class="w-full border p-3 rounded-lg mb-4"
placeholder="Report Title">

<textarea id="description"
class="w-full border p-3 rounded-lg mb-4"
placeholder="Report Description"></textarea>

<select id="status"
class="w-full border p-3 rounded-lg mb-4">

<option>Pending</option>
<option>Approved</option>

</select>

<button id="saveReport"
class="bg-blue-700 hover:bg-blue-800 text-white font-bold w-full p-3 rounded-lg">

Save Report

</button>

</div>

</main>

</div>

<script type="module" src="js/reports.js"></script>
<script type="module" src="js/auth.js"></script>

</body>
</html>
