<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ReportTrack - Login</title>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Firebase (modular SDK v10+) -->
  <script type="module" src="login.js" defer></script>
</head>

<body class="bg-gray-100 flex items-center justify-center min-h-screen">

  <div class="bg-white p-8 rounded-2xl shadow-lg w-full max-w-md">

    <h2 class="text-2xl font-bold text-center text-blue-600 mb-6">
      ReportTrack Login
    </h2>

    <form id="loginForm" class="space-y-4">

      <!-- Email -->
      <input 
        type="email" 
        id="email"
        placeholder="Enter Email"
        class="w-full p-3 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400"
        required
      />

      <!-- Password -->
      <input 
        type="password" 
        id="password"
        placeholder="Enter Password"
        class="w-full p-3 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400"
        required
      />

      <!-- Role Selection -->
      <select 
        id="role"
        class="w-full p-3 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400"
        required
      >
        <option value="">Select Role</option>
        <option value="admin">Admin</option>
        <option value="marketer">Marketer</option>
      </select>

      <!-- Login Button -->
      <button 
        type="submit"
        class="w-full bg-blue-600 text-white p-3 rounded-lg hover:bg-blue-700 transition"
      >
        Login
      </button>

    </form>

    <p class="text-sm text-center mt-4">
      Don’t have an account?
      <a href="register.html" class="text-blue-600 hover:underline">Register</a>
    </p>

    <!-- Message -->
    <p id="msg" class="text-center mt-3 text-sm text-red-500"></p>

  </div>

</body>
</html>
