<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login</title>

<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-gradient-to-r from-blue-700 to-indigo-900">

<div class="flex items-center justify-center min-h-screen">

<div class="bg-white p-8 rounded-2xl shadow-2xl w-full max-w-md">

<h2 class="text-4xl font-extrabold text-center text-blue-700 mb-6">

Login

</h2>

<input
id="email"
type="email"
placeholder="Email"
class="w-full border p-3 rounded-lg mb-4">

<input
id="password"
type="password"
placeholder="Password"
class="w-full border p-3 rounded-lg mb-4">

<button
id="loginBtn"
class="bg-blue-700 hover:bg-blue-800 text-white font-bold w-full p-3 rounded-lg">

Login

</button>

<p class="text-center mt-4">

No account?

<a href="register.html"
class="text-green-600 font-bold">

Register

</a>

</p>

</div>

</div>

<script type="module" src="js/auth.js"></script>

</body>

</html>
